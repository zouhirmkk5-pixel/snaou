<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapspy v4.0 - Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
        }

        .bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            opacity: 0.15;
            z-index: -1;
            filter: grayscale(1);
        }

        .neon-border {
            box-shadow: 0 0 15px rgba(255, 252, 0, 0.3);
            border: 1px solid rgba(255, 252, 0, 0.5);
        }

        .scanner-line {
            width: 100%;
            height: 2px;
            background: #FFFC00;
            position: absolute;
            top: 0;
            box-shadow: 0 0 15px #FFFC00;
            animation: scan 3s linear infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .shimmer {
            background: linear-gradient(90deg, #000, #333, #000);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="fixed inset-0 bg-gradient-to-b from-transparent to-black pointer-events-none"></div>

    <div class="relative w-full max-w-lg z-10">
        
        <div id="app-card" class="bg-[#111] rounded-3xl overflow-hidden neon-border relative">
            <div id="scanner" class="hidden scanner-line"></div>

            <div class="p-8 text-center border-b border-white/5 bg-[#151515]">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-[#FFFC00] rounded-2xl mb-4 rotate-3 transform hover:rotate-0 transition-all duration-500">
                    <i class="fab fa-snapchat text-4xl text-black"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-widest text-white uppercase">Snapspy <span class="text-[#FFFC00]">v4.0</span></h1>
                <p class="text-gray-500 text-xs mt-1 uppercase tracking-tighter">Remote Monitoring Interface</p>
            </div>

            <div class="p-8">
                <div id="initial-ui">
                    <div class="space-y-4 mb-8">
                        <div class="relative">
                            <label class="text-[10px] uppercase text-gray-500 font-bold ml-1 mb-2 block">Target Username</label>
                            <input type="text" id="target" placeholder="e.g. jared_22" 
                                class="w-full bg-[#0a0a0a] border border-white/10 rounded-xl px-5 py-4 focus:outline-none focus:border-[#FFFC00] transition-all font-mono text-yellow-400">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-[#151515] p-3 rounded-xl border border-white/5 cursor-pointer hover:bg-white/5 transition">
                                <i class="fas fa-comment-dots text-[#FFFC00] mb-2"></i>
                                <p class="text-[10px] font-bold">MESSAGES</p>
                            </div>
                            <div class="bg-[#151515] p-3 rounded-xl border border-white/5 cursor-pointer hover:bg-white/5 transition">
                                <i class="fas fa-camera text-[#FFFC00] mb-2"></i>
                                <p class="text-[10px] font-bold">PRIVATE SNAPS</p>
                            </div>
                        </div>
                    </div>

                    <button onclick="launchExploit()" class="w-full bg-[#FFFC00] text-black font-black py-5 rounded-xl text-lg hover:shadow-[0_0_30px_rgba(255,252,0,0.4)] transition-all active:scale-95">
                        START HACKING
                    </button>
                </div>

                <div id="processing-ui" class="hidden">
                    <div class="flex flex-col items-center justify-center py-10">
                        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#FFFC00] mb-6"></div>
                        <p id="status-text" class="text-[#FFFC00] font-mono text-sm uppercase tracking-widest">Initializing...</p>
                        <div class="w-full bg-white/5 h-1 mt-6 rounded-full overflow-hidden">
                            <div id="bar" class="h-full bg-[#FFFC00] transition-all duration-300" style="width: 0%"></div>
                        </div>
                        <div id="console" class="w-full mt-6 bg-black p-4 rounded-lg font-mono text-[10px] text-green-500 h-32 overflow-hidden leading-relaxed">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-6 flex justify-between px-4">
            <div class="text-left">
                <span class="block text-white font-bold text-xs">STATUS</span>
                <span class="text-green-500 text-[10px] animate-pulse">● SERVERS ONLINE</span>
            </div>
            <div class="text-right">
                <span class="block text-white font-bold text-xs">CONNECTED</span>
                <span class="text-gray-500 text-[10px]">1,402 USERS</span>
            </div>
        </div>
    </div>

    <script>
        function launchExploit() {
            const target = document.getElementById('target').value;
            if(!target) return alert('Username required');

            document.getElementById('initial-ui').classList.add('hidden');
            document.getElementById('processing-ui').classList.remove('hidden');
            document.getElementById('scanner').classList.remove('hidden');

            const consoleBox = document.getElementById('console');
            const statusText = document.getElementById('status-text');
            const bar = document.getElementById('bar');

            const logs = [
                "Locating cloud server...",
                "Searching for user: " + target,
                "User metadata found (ID: 8829-AX)",
                "Establishing secure tunnel...",
                "Bypassing 2FA handshake...",
                "Downloading media packets...",
                "Compiling data report...",
                "Finalizing encryption..."
            ];

            let i = 0;
            const timer = setInterval(() => {
                if(i < logs.length) {
                    let p = Math.floor(((i+1)/logs.length) * 100);
                    bar.style.width = p + "%";
                    statusText.innerText = logs[i];
                    consoleBox.innerHTML += `<div>[SYSTEM]: ${logs[i]}</div>`;
                    consoleBox.scrollTop = consoleBox.scrollHeight;
                    i++;
                } else {
                    clearInterval(timer);
                    setTimeout(() => {
                        window.location.href = "https://your-cpa-link.com"; // Beddel hada
                    }, 1000);
                }
            }, 1500);
        }
    </script>
</body>
</html>
